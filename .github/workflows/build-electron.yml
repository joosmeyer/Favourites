name: Build Favourites desktop app

on:
  push:
    branches: [electron-app]
    paths: ["electron/**", ".github/workflows/build-electron.yml"]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: Favourites-Windows
          path: |
            electron/dist/*.exe
          if-no-files-found: error
